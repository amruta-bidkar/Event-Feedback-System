        <form action="{{ url_for('saveform') }}" method="post">

<label>Name:</label>
<input type="text" name="name" placeholder="Enter your name" required>

<label>Event Name:</label>
<select name="event_name" required>
<option value="">Select Event</option>
<option>Tech Workshop</option>
<option>Web Development Seminar</option>
<option>AI Awareness Program</option>
<option>Cultural Fest</option>
</select>

<label>Rating:</label>

<div class="star-rating">
<input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
<input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
<input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
<input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
<input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
</div>

<label>Comments:</label>
<textarea name="comments" placeholder="Write your feedback"></textarea>

<button type="submit" onclick="show()">Submit Feedback</button>

</form>

    <script>
        function show(){
